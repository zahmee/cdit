name: Generate News

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: news-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate news.json
        run: node scripts/generate-news.mjs
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name "cdit-news-bot"
          git config user.email "bot@cdit.co"
          git add data/news.json
          if git diff --quiet --staged; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore: refresh news $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
